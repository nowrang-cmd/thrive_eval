<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THRiVE | Player Report</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: #8B6E2E;
    --dark2: #F5F5F5;
    --dark3: #E0E0E0;
    --white: #1A1A1A;
    --grey: #666;
    --red: #C0392B;
    --badge-foundations: #4A90D9;
    --badge-advanced:    #27AE60;
    --badge-elite:       #C9A84C;
    --badge-nextlevel:   #8E44AD;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; color: var(--white); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  /* ===== PIN SCREEN ===== */
  #pinScreen {
    position: fixed;
    inset: 0;
    background: #0A0A0A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 24px;
  }

  #pinScreen img { width: 200px; height: auto; margin-bottom: 24px; }

  #pinScreen h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 4px;
  }

  #pinScreen p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #ffffff;
    text-transform: uppercase;
    margin-bottom: 28px;
    text-align: center;
  }

  .pin-fields {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 320px;
    margin-bottom: 16px;
  }

  .pin-field-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .pin-field-group label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .pin-field-group input {
    background: #1A1A1A;
    border: 1px solid #2A2A2A;
    border-radius: 4px;
    color: #ffffff;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }

  .pin-field-group input:focus { border-color: var(--gold); }
  .pin-field-group input::placeholder { color: #444; }

  .pin-submit-btn {
    width: 100%;
    max-width: 320px;
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .pin-submit-btn:hover { background: var(--gold-light); }

  .pin-error {
    color: var(--red);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-top: 12px;
    text-align: center;
    min-height: 20px;
  }

  /* ===== REPORT ===== */
  #report { display: none; }

  header {
    background: #1A1A1A;
    border-bottom: 2px solid var(--gold);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 4px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-logout:hover { background: var(--gold); color: #000; }

  .container { max-width: 760px; margin: 0 auto; padding: 40px 24px 80px; }

  /* Player header */
  .player-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .player-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    letter-spacing: 3px;
    color: var(--white);
    margin-bottom: 4px;
  }

  .player-header p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    color: var(--grey);
    letter-spacing: 1px;
  }

  /* Current placement */
  .current-placement {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: var(--dark2);
    border: 1px solid var(--dark3);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .current-placement img {
    width: 90px;
    height: auto;
  }

  .placement-info {
    text-align: center;
  }

  .placement-info .label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 4px;
  }

  .placement-info .level {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    color: var(--gold);
  }

  .placement-info .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--grey);
  }

  /* Section label */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--gold-dim);
  }

  /* Radar */
  .radar-section {
    margin-bottom: 32px;
  }

  .radar-wrap {
    display: flex;
    justify-content: center;
    background: var(--dark2);
    border: 1px solid var(--dark3);
    border-radius: 8px;
    padding: 16px;
  }

  /* Score pills */
  .score-pills {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 32px;
  }

  .pill {
    background: var(--dark2);
    border: 1px solid var(--dark3);
    border-radius: 6px;
    padding: 12px 8px;
    text-align: center;
  }

  .pill-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 2px;
  }

  .pill-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--gold);
    line-height: 1;
  }

  /* Eval history */
  .eval-card {
    background: var(--dark2);
    border: 1px solid var(--dark3);
    border-radius: 8px;
    padding: 22px;
    margin-bottom: 16px;
  }

  .eval-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .eval-card-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--white);
  }

  .eval-card-meta {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    color: var(--grey);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .eval-type-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--gold);
    color: #000;
  }

  .eval-type-tag.re { background: #333; color: #fff; }

  .eval-scores-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .eval-score-box {
    background: #0A0A0A;
    border-radius: 6px;
    padding: 10px 16px;
    text-align: center;
    min-width: 100px;
  }

  .eval-score-box .esl {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #aaa;
    display: block;
    margin-bottom: 2px;
  }

  .eval-score-box .esv {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--gold);
    line-height: 1;
  }

  .eval-score-box.raw .esv { color: #aaa; font-size: 22px; }

  /* Notes sections */
  .notes-section {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .note-block {
    background: #fff;
    border: 1px solid var(--dark3);
    border-radius: 6px;
    padding: 12px 16px;
    border-left: 4px solid var(--gold);
  }

  .note-block.challenges { border-left-color: #E74C3C; }
  .note-block.nextsteps  { border-left-color: #27AE60; }

  .note-block-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 4px;
  }

  .note-block-text {
    font-size: 14px;
    color: var(--white);
    line-height: 1.6;
  }

  .loading-state {
    text-align: center;
    padding: 60px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--grey);
    text-transform: uppercase;
  }

  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 2px solid var(--dark3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

const CATEGORIES = [
  { id: "Shooting",      short: "SHOOT" },
  { id: "Ball Handling", short: "BALL H." },
  { id: "Defense",       short: "DEF" },
  { id: "Athleticism",   short: "ATHL" },
  { id: "Basketball IQ", short: "IQ" },
  { id: "Rebounding",    short: "REB" },
];

let currentPlayer = null;
let allEvals = [];

// ===== LOGIN =====
function loginReport() {
  const lastName  = document.getElementById("inputLastName").value.trim().toLowerCase();
  const birthYear = document.getElementById("inputBirthYear").value.trim();
  const errEl     = document.getElementById("pinError");

  if (!lastName || !birthYear) {
    errEl.textContent = "Please enter both your last name and birth year.";
    return;
  }

  errEl.textContent = "Looking up your report...";

  const script = document.createElement("script");
  script.src = APPS_SCRIPT_URL + "?action=getAll&callback=onEvalsForLogin";
  window._loginLastName  = lastName;
  window._loginBirthYear = birthYear;
  script.onerror = () => { errEl.textContent = "Could not connect. Try again."; };
  document.body.appendChild(script);
  setTimeout(() => script.remove(), 6000);
}

function onEvalsForLogin(data) {
  const errEl    = document.getElementById("pinError");
  const lastName = window._loginLastName;
  const birthYear= window._loginBirthYear;

  if (!Array.isArray(data)) { errEl.textContent = "Could not load data. Try again."; return; }

  // Find matching player by last name
  const matches = data.filter(row => {
    const rowLast = (row["Last Name"] || "").trim().toLowerCase();
    return rowLast === lastName;
  });

  if (!matches.length) {
    document.getElementById("pinError").textContent = "No evaluations found. Check your last name.";
    return;
  }

  // Now verify birth year against Athletes sheet
  const script = document.createElement("script");
  script.src = APPS_SCRIPT_URL + "?action=getAthletes&callback=onAthletesForLogin";
  window._evalMatches = matches;
  document.body.appendChild(script);
  setTimeout(() => script.remove(), 6000);
}

function onAthletesForLogin(athletes) {
  const errEl    = document.getElementById("pinError");
  const lastName = window._loginLastName;
  const birthYear= window._loginBirthYear;
  const matches  = window._evalMatches;

  // Find athlete with matching last name and birth year
  const athlete = (athletes || []).find(a => {
    const aLast = (a["Athlete Last Name"] || "").trim().toLowerCase();
    const bday  = (a["Birthday"] || "").toString();
    return aLast === lastName && bday.includes(birthYear);
  });

  if (!athlete) {
    errEl.textContent = "Birth year doesn\'t match. Please try again.";
    return;
  }

  // Verified — show report
  allEvals = matches.sort((a,b) => new Date(a["Eval Date"]) - new Date(b["Eval Date"]));
  currentPlayer = matches[0]["Player Name"] || (matches[0]["First Name"] + " " + matches[0]["Last Name"]);
  showReport();
}

function showReport() {
  document.getElementById("pinScreen").style.display = "none";
  document.getElementById("report").style.display    = "block";

  const latest = allEvals[allEvals.length - 1];

  // Player header
  document.getElementById("reportPlayerName").textContent = currentPlayer;
  document.getElementById("reportPlayerMeta").textContent =
    (latest["Grade Level"] || "") + " · " + (latest["Position"] || "");

  // Placement
  const placement = latest["Placement Level"] || "";
  document.getElementById("reportPlacement").textContent = placement;
  document.getElementById("reportScore").textContent =
    "Weighted: " + parseFloat(latest["Weighted Score"]).toFixed(1) + " / 10";
  if (BADGE_IMAGES[placement]) {
    document.getElementById("reportBadgeImg").src = BADGE_IMAGES[placement];
  }

  // Radar
  const radarData = CATEGORIES.map(c => ({
    label: c.short,
    value: parseFloat(latest[c.id]) || 0
  }));
  setTimeout(() => drawRadar("reportRadar", radarData), 100);

  // Pills
  const pillsEl = document.getElementById("reportPills");
  pillsEl.innerHTML = CATEGORIES.map(c => `
    <div class="pill">
      <div class="pill-name">${c.id}</div>
      <div class="pill-val">${latest[c.id] || "-"}</div>
    </div>`).join("");

  // History
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById("reportHistory");
  el.innerHTML = allEvals.map((ev, i) => {
    const isInitial = (ev["Eval Type"] || "").toLowerCase().includes("initial");
    const strengths  = ev["Strengths"]  || "";
    const challenges = ev["Challenges"] || "";
    const nextSteps  = ev["Next Steps"] || "";

    return `
      <div class="eval-card">
        <div class="eval-card-header">
          <div>
            <div class="eval-card-date">Evaluation ${i + 1} — ${ev["Eval Date"] || ""}</div>
            <div class="eval-card-meta">${ev["Coach Name"] || ""} · ${ev["Position"] || ""}</div>
          </div>
          <span class="eval-type-tag ${isInitial ? "" : "re"}">${ev["Eval Type"] || "Evaluation"}</span>
        </div>

        <div class="eval-scores-row">
          <div class="eval-score-box">
            <span class="esl">Weighted</span>
            <span class="esv">${parseFloat(ev["Weighted Score"]).toFixed(1)}</span>
          </div>
          <div class="eval-score-box raw">
            <span class="esl">Raw Avg</span>
            <span class="esv">${parseFloat(ev["Raw Average"]).toFixed(1)}</span>
          </div>
          <div class="eval-score-box">
            <span class="esl">Placement</span>
            <span class="esv" style="font-size:16px;color:var(--white)">${ev["Placement Level"] || ""}</span>
          </div>
        </div>

        ${strengths || challenges || nextSteps ? `
        <div class="notes-section">
          ${strengths  ? `<div class="note-block"><div class="note-block-label">Strengths</div><div class="note-block-text">${strengths}</div></div>` : ""}
          ${challenges ? `<div class="note-block challenges"><div class="note-block-label">Challenges</div><div class="note-block-text">${challenges}</div></div>` : ""}
          ${nextSteps  ? `<div class="note-block nextsteps"><div class="note-block-label">Next Steps</div><div class="note-block-text">${nextSteps}</div></div>` : ""}
        </div>` : ""}
      </div>`;
  }).join("");
}

function logout() {
  document.getElementById("pinScreen").style.display = "flex";
  document.getElementById("report").style.display    = "none";
  document.getElementById("inputLastName").value  = "";
  document.getElementById("inputBirthYear").value = "";
  document.getElementById("pinError").textContent = "";
  allEvals = [];
  currentPlayer = null;
}

// ===== RADAR =====
function drawRadar(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const R = Math.min(cx, cy) - 30;
  const n = data.length;
  const step = (Math.PI * 2) / n;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let level = 1; level <= 5; level++) {
    const r = (R / 5) * level;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const angle = step * i - Math.PI / 2;
      i === 0 ? ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle))
              : ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    }
    ctx.closePath();
    ctx.strokeStyle = "rgba(0,0,0,0.08)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  for (let i = 0; i < n; i++) {
    const angle = step * i - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
    ctx.strokeStyle = "rgba(0,0,0,0.1)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  ctx.beginPath();
  data.forEach((d, i) => {
    const angle = step * i - Math.PI / 2;
    const r = (d.value / 10) * R;
    i === 0 ? ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle))
            : ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
  });
  ctx.closePath();
  ctx.fillStyle = "rgba(201,168,76,0.2)";
  ctx.fill();
  ctx.strokeStyle = "#C9A84C";
  ctx.lineWidth = 2.5;
  ctx.stroke();
  data.forEach((d, i) => {
    const angle = step * i - Math.PI / 2;
    const r = (d.value / 10) * R;
    ctx.beginPath();
    ctx.arc(cx + r * Math.cos(angle), cy + r * Math.sin(angle), 5, 0, Math.PI * 2);
    ctx.fillStyle = "#C9A84C";
    ctx.fill();
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.stroke();
  });
  ctx.font = "bold 11px 'Barlow Condensed'";
  data.forEach((d, i) => {
    const angle = step * i - Math.PI / 2;
    const lR = R + 22;
    ctx.fillStyle = "#8B6E2E";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(d.label, cx + lR * Math.cos(angle), cy + lR * Math.sin(angle));
  });
}
</script>
